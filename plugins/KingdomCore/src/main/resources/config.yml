display-name: KingdomCore

storage:
  type: sqlite
  sqlite-file: kingdomcore.db
  persist-cooldowns: true

allowlist:
  enabled: false

client-lockdown:
  enabled: true
  block-seed-command: true
  op-bypass: false
  kick-message: |-
    §cDisallowed client detected.
    §7Remove cheat, minimap, replay, or xray mods/packs.
    §7Matched: §f{pattern}
  forbidden-patterns:
    - wurst
    - xaero
    - xray
    - x_ray
    - x-ray
    - minimap
    - mini_map
    - mini-map
    - journeymap
    - journey_map
    - journey-map
    - voxelmap
